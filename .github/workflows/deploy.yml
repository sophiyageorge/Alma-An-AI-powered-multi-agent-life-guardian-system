name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:

  # ====================================
#  TEST JOB
# ====================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest


    env:
      ALMA_ENV: test
      PYTHONPATH: .
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TWILIO_ACCOUNT_SID: ${{secrets.TWILIO_ACCOUNT_SID}}
      TWILIO_AUTH_TOKEN: ${{secrets.TWILIO_AUTH_TOKEN}}
      TWILIO_PHONE_NUMBER: ${{secrets.TWILIO_PHONE_NUMBER}}



   

     

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install -r backend/requirements.txt

      - name: Run pytest
        run: pytest -v

# =========================
# BUILD BACKEND
# =========================
  build-backend:
    runs-on: ubuntu-latest
    needs: test

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/alma_backend:latest

# =========================
# DEPLOY TO EC2
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend]

    if: github.ref == 'refs/heads/main'

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/alma_backend:latest

            docker rm -f alma_backend || true

            # Stop and remove existing container (if any)
            if [ $(docker ps -aq -f name=alma_backend) ]; then
              docker stop alma_backend
              docker rm alma_backend
            fi

            # Run container with volume mount for database
            

            docker run -d  --name alma_backend -p 5000:8000 -v /home/ubuntu/data:/app/data --env-file /home/ubuntu/.env ${{ secrets.DOCKERHUB_USERNAME }}/alma_backend:latest

            echo "Deployed successfully"

